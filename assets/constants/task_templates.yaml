# Task type definitions and default parameter templates
# Used by the EtherCAT Task Editor extension

task_types:
  - id: 1
    description: "DJI RC"
    has_read: true
    has_write: false

  - id: 2
    description: "LkTech Motor"
    has_read: true
    has_write: true
    template: |
      sdowrite_control_period: !uint16_t 1
      sdowrite_can_packet_id: !uint32_t 0x141
      sdowrite_can_inst: !uint8_t 1
      sdowrite_control_type: !uint8_t 8

  - id: 3
    description: "HIPNUC IMU (CAN)"
    has_read: true
    has_write: false
    template: |
      sdowrite_can_inst: !uint8_t 1
      sdowrite_packet1_id: !uint32_t 0x01
      sdowrite_packet2_id: !uint32_t 0x02
      sdowrite_packet3_id: !uint32_t 0x03
      conf_frame_name: !std::string 'imu_link'

  - id: 4
    description: "DSHOT600"
    has_read: false
    has_write: true
    template: |
      sdowrite_dshot_id: !uint8_t 1
      sdowrite_init_value: !uint16_t 0

  - id: 5
    description: "DJI Motor"
    has_read: true
    has_write: true
    template: |
      sdowrite_control_period: !uint16_t 1
      sdowrite_can_packet_id: !uint32_t 0x200
      sdowrite_motor1_can_id: !uint32_t 0x201
      sdowrite_motor2_can_id: !uint32_t 0x202
      sdowrite_motor3_can_id: !uint32_t 0x203
      sdowrite_motor4_can_id: !uint32_t 0
      sdowrite_can_inst: !uint8_t 1
      sdowrite_motor1_control_type: !uint8_t 2
      sdowrite_motor1_speed_pid_kp: !float 13.5
      sdowrite_motor1_speed_pid_ki: !float 1
      sdowrite_motor1_speed_pid_kd: !float 0
      sdowrite_motor1_speed_pid_max_out: !float 16384
      sdowrite_motor1_speed_pid_max_iout: !float 2000
      sdowrite_motor2_control_type: !uint8_t 2
      sdowrite_motor2_speed_pid_kp: !float 13.5
      sdowrite_motor2_speed_pid_ki: !float 1
      sdowrite_motor2_speed_pid_kd: !float 0
      sdowrite_motor2_speed_pid_max_out: !float 16384
      sdowrite_motor2_speed_pid_max_iout: !float 2000
      sdowrite_motor3_control_type: !uint8_t 1

  - id: 6
    description: "OnBoard PWM"
    has_read: false
    has_write: true

  - id: 7
    description: "External PWM"
    has_read: false
    has_write: true
    template: |
      sdowrite_uart_id: !uint8_t 1
      sdowrite_pwm_period: !uint16_t 20000
      sdowrite_channel_num: !uint8_t 1
      sdowrite_init_value: !uint16_t 1000

  - id: 8
    description: "MS5837 (30BA)"
    has_read: true
    has_write: false
    template: |
      sdowrite_i2c_id: !uint8_t 1
      sdowrite_osr_id: !uint8_t 5

  - id: 9
    description: "ADC"
    has_read: false
    has_write: false

  - id: 10
    description: "PMU (CAN)"
    has_read: true
    has_write: false

  - id: 11
    description: "SBUS RC"
    has_read: true
    has_write: false

  - id: 12
    description: "DM Motor"
    has_read: true
    has_write: true
    template: |
      sdowrite_control_period: !uint16_t 1
      sdowrite_can_id: !uint16_t 0x01
      sdowrite_master_id: !uint16_t 0x00
      sdowrite_can_inst: !uint8_t 1
      sdowrite_control_type: !uint8_t 1
      conf_pmax: !float 12.5
      conf_vmax: !float 30.0
      conf_tmax: !float 10.0

  - id: 13
    description: "Super Capacitor"
    has_read: true
    has_write: true
    template: |
      sdowrite_can_inst: !uint8_t 1
      sdowrite_chassis_to_cap_id: !uint32_t 0x210
      sdowrite_cap_to_chassis_id: !uint32_t 0x211

  - id: 14
    description: "DJI VT13"
    has_read: true
    has_write: false

  - id: 15
    description: "DD Motor"
    has_read: true
    has_write: true
    template: |
      sdowrite_control_period: !uint16_t 1
      sdowrite_can_baudrate: !uint8_t 1
      sdowrite_can_packet_id: !uint32_t 0x1
      sdowrite_motor1_can_id: !uint32_t 0
      sdowrite_motor2_can_id: !uint32_t 0
      sdowrite_motor3_can_id: !uint32_t 0
      sdowrite_motor4_can_id: !uint32_t 0
      sdowrite_can_inst: !uint8_t 1
      sdowrite_motor1_control_type: !uint8_t 1
